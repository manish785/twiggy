name: Frontend CI

on:
  push:
    paths:
      - "src/**"
      - "index.html"
      - "index.css"
      - "package.json"
      - "package-lock.json"
      - "jest.config.js"
      - "tailwind.config.js"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "index.html"
      - "index.css"
      - "package.json"
      - "package-lock.json"
      - "jest.config.js"
      - "tailwind.config.js"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Production build
        run: npm run build
        env:
          REACT_APP_API_BASE_URL: https://api.example.com/api/v1
          REACT_APP_AUTH0_DOMAIN: example.us.auth0.com
          REACT_APP_AUTH0_CLIENT_ID: example-client-id
          REACT_APP_AUTH0_AUDIENCE: https://api.example.com
