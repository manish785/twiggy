# Two services: static frontend + Node API
# https://dashboard.render.com/blueprint/new?repo=https://github.com/manish785/twiggy

services:
  # ?? Backend API (Node) ?????????????????????????????????????????????
  - type: web
    name: foodheaven-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_API_TOKEN
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 120
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false

  # ?? Frontend (static build — NOT parcel dev server) ????????????????
  - type: web
    name: foodheaven-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE_URL
        sync: false
      - key: REACT_APP_AUTH0_DOMAIN
        sync: false
      - key: REACT_APP_AUTH0_CLIENT_ID
        sync: false
      - key: REACT_APP_AUTH0_AUDIENCE
        sync: false
